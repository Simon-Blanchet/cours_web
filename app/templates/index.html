<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulaire de recherche</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
<h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Recherche</h1>
 
        <!-- Formulaire de recherche -->
<form method="POST" action="/artists" class="space-y-4">
<div>
<label for="query" class="block text-sm font-medium text-gray-700">Rechercher :</label>
<input
                    type="text"
                    id="query"
                    name="query"
                    required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="Saisissez votre recherche..."
>
</div>
<button
                type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
>
                Rechercher
</button>
</form>
 
 {% if artists is not none %}
<div class="mt-6 bg-white shadow overflow-hidden border-b border-gray-200 rounded-lg">
    <h2 class="text-lg font-medium text-gray-800 p-4 border-b">Résultats :</h2>
    
    {% if artists %}
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Prenom</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Groupe</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {% for artist in artists %}
            <tr class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ artist['id_artiste'] }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ artist['nom'] }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ artist['prenom'] }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ artist['id_groupe'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <div class="p-4 text-gray-500 text-center">Aucun artiste trouvé.</div>
    {% endif %}
</div>
{% endif %}
</body>
</html>
